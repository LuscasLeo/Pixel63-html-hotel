syntax = "proto3";

import "Room/Information/RoomInformationOwnerData.proto";

message RoomInformationData {
    string id = 9;
    
    string type = 1;

    string name = 2;
    string description = 3;
    string category = 4;
    optional string thumbnail = 5;

    RoomInformationOwnerData owner = 6;

    uint32 max_users = 7;

    string lock = 8;

    string trading = 10;

    bool allow_walking_through_users = 11;

    bool allow_pets = 12;
    bool allow_pets_to_eat_food = 13;
    bool mute_all_pets = 14;
}
