syntax = "proto3";

message UpdateRoomInformationData {
    optional string type = 1;
    optional string name = 2;
    optional string description = 3;
    optional string category = 4;
    optional uint32 max_users = 5;
    optional string thumbnail = 6;
    optional string lock = 7;
    optional string password = 8;
    optional string trading = 9;
    optional bool allow_walking_through_users = 10;
    optional bool allow_pets = 11;
    optional bool allow_pets_to_eat_food = 12;
    optional bool mute_all_pets = 13;
}
