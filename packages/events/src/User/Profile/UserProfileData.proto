syntax = "proto3";

import "Figure/FigureConfigurationData.proto";
import "Badge/BadgeData.proto";
import "Groups/GroupData.proto";

message UserProfileData {
    string id = 1;

    string name = 2;
    optional string motto = 3;
    
    FigureConfigurationData figure_configuration = 4;

    repeated BadgeData badges = 5;

    bool online = 6;
    optional string last_online_at = 7;
    string created_at = 8;

    uint32 friends_count = 9;

    message UserProfileFriendRelationshipsData {
        string user_id = 1;
        string name = 2;
        FigureConfigurationData figure_configuration_data = 3;
    }

    repeated UserProfileFriendRelationshipsData love_relationships = 10;
    repeated UserProfileFriendRelationshipsData smile_relationships = 11;
    repeated UserProfileFriendRelationshipsData bobba_relationships = 12;

    repeated GroupData groups = 13;
}
